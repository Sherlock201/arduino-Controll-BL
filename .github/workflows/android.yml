name: Build Android APK (Buildozer)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create Force Patch
        # Мы создаем структуру папок, которую buildozer монтирует внутри контейнера.
        # Мы кладем туда ПРАВИЛЬНЫЙ шаблон манифеста.
        run: |
          mkdir -p .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/common/build/templates/
          
          # Записываем "хакнутый" шаблон сразу с нужными атрибутами
          cat <<EOF > .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/common/build/templates/AndroidManifest.tmplt.xml
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="{{ args.package }}"
              android:versionCode="{{ args.version_code }}"
              android:versionName="{{ args.version }}"
              android:installLocation="{{ args.install_location }}">
              <uses-sdk android:minSdkVersion="{{ args.min_sdk_version }}" android:targetSdkVersion="{{ args.target_sdk_version }}" />
              {% for permission in args.permissions %}
              <uses-permission android:name="{{ permission }}" />
              {% endfor %}
              <application 
                  android:label="{{ args.name }}"
                  android:icon="@mipmap/icon"
                  android:hardwareAccelerated="true"
                  android:usesCleartextTraffic="true"
                  android:networkSecurityConfig="@xml/network_security_config"
                  {{ args.extra_application_attributes }}>
                  <activity android:name="org.kivy.android.PythonActivity"
                      android:label="{{ args.name }}"
                      android:configChanges="mcc|mnc|locale|touchscreen|keyboard|keyboardHidden|navigation|orientation|screenLayout|uiMode|screenSize|smallestScreenSize|layoutDirection|fontScale"
                      android:launchMode="singleTask"
                      android:screenOrientation="{{ args.orientation }}"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  {{ args.extra_manifest_xml }}
              </application>
          </manifest>
          EOF

      - name: Pull Buildozer Docker image
        run: docker pull kivy/buildozer:latest

      - name: Build APK
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
