name: Build Android APK (Buildozer)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          # Проверяем ресурсы
          ls -R res/xml/
          
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "
            # 1. Разрешаем работу под root (исправляет ошибку EOFError)
            export APP_ALLOW_ROOT=1
            
            # 2. Ищем шаблон манифеста в новом пути Python 3.12 и патчим его
            # Мы используем более гибкий поиск, чтобы не зависеть от версии
            find /home/user/.venv/lib/ -name AndroidManifest.tmpl.xml -exec sed -i 's/<application/<application android:networkSecurityConfig=\"@xml\/network_security_config\" android:usesCleartextTraffic=\"true\"/g' {} +
            
            # 3. Запускаем сборку
            buildozer android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
