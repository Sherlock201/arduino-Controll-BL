name: Build Android APK (Buildozer Force Patch)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pull Buildozer Docker image
        run: docker pull kivy/buildozer:latest

      - name: Build APK (Force Patching Manifest)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "
              # 1. Запускаем предварительную подготовку, чтобы скачались компоненты p4a
              buildozer android p4a -- --help || true
              
              # 2. Ищем шаблон манифеста внутри контейнера и ЖЕСТКО внедряем атрибуты
              # Мы правим файл AndroidManifest.tmplt.xml во всех возможных местах
              find /home/user/.buildozer -name AndroidManifest.tmplt.xml -exec sed -i 's/<application/<application android:usesCleartextTraffic=\"true\" android:networkSecurityConfig=\"@xml\/network_security_config\"/g' {} + || true
              
              # 3. Запускаем реальную сборку
              buildozer -v android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
