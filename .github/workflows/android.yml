name: Build Android APK (Buildozer)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare buildozer.spec
        run: |
          # Чистим старые атрибуты и прописываем всё в одну строку
          sed -i '/android.manifest.application_attributes/d' buildozer.spec
          sed -i '/android.add_resources/d' buildozer.spec
          
          # Вставляем настройки сразу после [app]
          sed -i '/\[app\]/a android.manifest.application_attributes = android:networkSecurityConfig="@xml/network_security_config" android:usesCleartextTraffic="true"' buildozer.spec
          sed -i '/\[app\]/a android.add_resources = res' buildozer.spec
          
          # Проверка в логах Гитхаба
          grep "android.manifest" buildozer.spec

      - name: Pull Buildozer Docker image
        run: docker pull kivy/buildozer:latest

      - name: Build APK
        run: |
          # Запускаем сборку. Если .spec проигнорирует атрибуты, 
          # P4A_EXTRA_ARGS может подстраховать (зависит от версии p4a внутри образа)
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
