name: Build Android APK (Buildozer)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pull Buildozer Docker image
        run: docker pull kivy/buildozer:latest

      - name: Build APK
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            kivy/buildozer:latest \
            bash -c "buildozer android clean && \
                     sed -i 's/<application/<application android:usesCleartextTraffic=\"true\"/g' .buildozer/android/platform/python-for-android/pythonforandroid/bootstraps/common/build/templates/AndroidManifest.tmplt.xml || true && \
                     buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
