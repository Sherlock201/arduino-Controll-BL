name: Build Android APK (Buildozer Force Patch)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pull Buildozer Docker image
        run: docker pull kivy/buildozer:latest

      - name: Build APK (Force Patching Manifest)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "
              # 1. Запускаем установку компонентов p4a без подтверждения root
              export BUILDOZER_ALLOW_ORG_DOC_ROOT=1
              yes y | buildozer android p4a -- --help || true
              
              # 2. Ищем шаблон манифеста в локальной директории билда
              # В современных версиях p4a качается в .buildozer/android/platform/...
              find .buildozer/ -name AndroidManifest.tmplt.xml -exec sed -i 's/<application/<application android:usesCleartextTraffic=\"true\" android:networkSecurityConfig=\"@xml\/network_security_config\"/g' {} + || true
              
              # 3. Запускаем реальную сборку с игнорированием проверки root
              yes y | buildozer -v android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
