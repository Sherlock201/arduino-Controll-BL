name: Build Android APK (Buildozer)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          # Проверка ресурсов (для логов)
          ls -R res/xml/ || echo "Directory res/xml/ not found!"
          
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "
            # 1. Жестко разрешаем root через переменную
            export APP_ALLOW_ROOT=1
            
            # 2. Ищем шаблон манифеста везде в .venv (теперь путь точно найдется)
            find /home/user/.venv/ -name AndroidManifest.tmpl.xml -exec sed -i 's/<application/<application android:networkSecurityConfig=\"@xml\/network_security_config\" android:usesCleartextTraffic=\"true\"/g' {} +
            
            # 3. Запускаем сборку, автоматически отвечая 'y' на любые вопросы
            yes y | buildozer android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
