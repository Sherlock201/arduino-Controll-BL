name: Build Android APK (Buildozer)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build APK with Docker
        run: |
          # 1. Проверяем наличие файла конфига
          ls -R res/xml/
          
          # 2. Запускаем Docker с инъекцией атрибутов в шаблон манифеста
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            --entrypoint /bin/bash \
            kivy/buildozer:latest \
            -c "
            # Находим шаблон манифеста внутри контейнера и принудительно вставляем атрибуты
            find /home/user/.local/lib/python3.11/site-packages/pythonforandroid/ -name AndroidManifest.tmpl.xml -exec sed -i 's/<application/<application android:networkSecurityConfig=\"@xml\/network_security_config\" android:usesCleartextTraffic=\"true\"/g' {} +
            
            # Запускаем сборку
            buildozer android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
